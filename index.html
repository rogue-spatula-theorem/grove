        </div>
      </div>`;
    }

    /* Contact info */
    const infoItems = [];
    if (c.workEmail) infoItems.push({ label: 'Work email', value: c.workEmail, link: `mailto:${c.workEmail}` });
    if (c.personalEmail) infoItems.push({ label: 'Personal email', value: c.personalEmail, link: `mailto:${c.personalEmail}` });
    if (c.mobile) infoItems.push({ label: 'Mobile', value: c.mobile, link: phoneClean ? `tel:${phoneClean}` : null });
    if (c.linkedin) infoItems.push({ label: 'LinkedIn', value: c.linkedin, link: linkedinUrl });
    if (c.socialHandle) infoItems.push({ label: 'Social', value: c.socialHandle });
    if (c.location) infoItems.push({ label: 'Location', value: c.location });
    if (c.industry) infoItems.push({ label: 'Industry', value: c.industry });

    if (infoItems.length > 0) {
      html += `<div style="padding:0 16px 14px">
        <div class="section-header" style="padding:0 0 8px"><h2>Details</h2></div>
        <div class="card card-flush">
          ${infoItems.map((it,i) => `
            <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;${i<infoItems.length-1?'border-bottom:0.5px solid var(--sep2)':''}">
              <div style="flex:1;min-width:0">
                <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;font-weight:600">${esc(it.label)}</div>
                ${it.link
                  ? `<a href="${esc(it.link)}" style="font-size:15px;color:var(--green);text-decoration:none;word-break:break-word">${esc(it.value)}</a>`
                  : `<div style="font-size:15px;color:var(--text);word-break:break-word">${esc(it.value)}</div>`}
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
    }

    /* Tags */
    if (c.tags && c.tags.length) {
      html += `<div style="padding:0 16px 14px">
        <div class="section-header" style="padding:0 0 8px"><h2>Tags</h2></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${c.tags.map(t => `<span class="chip chip-tag">#${esc(t)}</span>`).join('')}
        </div>
      </div>`;
    }

    /* Relationships */
    const rels = (c.relationships || []).map(r => {
      const other = allContacts.find(x => x.id === r.contactId);
      return other ? { ...r, contact: other } : null;
    }).filter(Boolean);
    html += `<div style="padding:0 16px 14px">
      <div class="section-header" style="padding:0 0 8px;display:flex;align-items:center;justify-content:space-between">
        <h2>Related people</h2>
        <button class="tap" onclick="openAddRelationship('${c.id}')" style="background:transparent;border:none;color:var(--green);font-size:13px;font-weight:600;cursor:pointer">+ Add</button>
      </div>`;
    if (rels.length === 0) {
      html += `<div style="padding:14px 16px;background:var(--surface);border-radius:14px;font-size:13px;color:var(--text-3);text-align:center">No relationships linked yet.</div>`;
    } else {
      html += `<div class="card card-flush">`;
      rels.forEach((r, i) => {
        const oc = avatarColor(r.contact.avatarColor);
        const oi = (initials(r.contact) || '·').toUpperCase();
        const typeLabel = (RELATIONSHIP_TYPES.find(t => t.id === r.type) || {}).label || r.type;
        html += `<button class="tap-bg" onclick="openContact('${r.contact.id}')" style="
          display:flex;align-items:center;gap:12px;padding:12px 16px;width:100%;background:transparent;border:none;text-align:left;cursor:pointer;${i<rels.length-1?'border-bottom:0.5px solid var(--sep2)':''}">
          <div class="avatar" style="width:36px;height:36px;font-size:13px;background:${oc.bg};color:${oc.text}">${esc(oi)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;color:var(--text);font-weight:600">${esc(fullName(r.contact))}</div>
            <div style="font-size:12px;color:var(--text-2)">${esc(typeLabel)}${r.note?' · '+esc(r.note):''}</div>
          </div>
          <button class="tap" onclick="event.stopPropagation();removeRelationship('${c.id}','${r.contact.id}')" style="background:transparent;border:none;color:var(--text-3);padding:4px;cursor:pointer">${Icons.trash()}</button>
        </button>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }
  else if (detailTab === 'memory') {
    const memItems = [
      { label: 'Interests', value: c.interests, icon: 'sparkles' },
      { label: 'Important people', value: c.importantPeople, icon: 'people' },
      { label: 'Key facts', value: c.keyFacts, icon: 'star' },
      { label: 'Notes', value: c.memoryNotes, icon: 'dots' },
    ].filter(i => i.value && i.value.trim());

    html += `<div style="padding:0 16px 14px">
      <div class="card" style="padding:16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <div style="width:34px;height:34px;border-radius:10px;background:var(--gold-soft);color:var(--gold-ink);display:flex;align-items:center;justify-content:center">${Icons.sparkles()}</div>
          <div style="font-size:11px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:0.6px">Memory</div>
        </div>
        ${memItems.length === 0
          ? `<div style="font-size:14px;color:var(--text-3);padding:14px 0;text-align:center">No memory notes yet. Tap the menu to edit.</div>`
          : memItems.map(it => `
            <div style="margin-bottom:12px">
              <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:4px">${esc(it.label)}</div>
              <div style="font-size:14px;color:var(--text);line-height:1.5;white-space:pre-wrap">${esc(it.value)}</div>
            </div>
          `).join('')
        }
      </div>
    </div>`;
  }
  else if (detailTab === 'timeline') {
    html += `<div style="padding:0 16px 14px">`;
    html += `<button class="btn btn-secondary tap" onclick="openLogEncounter('${c.id}')" style="margin-bottom:12px">+ Log encounter</button>`;
    if (encounters.length === 0) {
      html += `<div style="padding:30px 16px;text-align:center;color:var(--text-3);font-size:14px">No encounters logged yet.</div>`;
    } else {
      html += `<div class="card card-flush">`;
      encounters.forEach((e, i) => {
        const ico = TYPE_ICON[e.type] || 'dots';
        html += `<button class="tap-bg" onclick="openEncounterDetail('${c.id}','${e.id}')" style="
          display:flex;align-items:flex-start;gap:12px;padding:14px 16px;width:100%;background:transparent;border:none;text-align:left;cursor:pointer;${i<encounters.length-1?'border-bottom:0.5px solid var(--sep2)':''}">
          <div style="width:34px;height:34px;border-radius:9px;background:var(--green-soft);color:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0">${Icons[ico]()}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
              <div style="font-size:14px;font-weight:600;color:var(--text)">${esc(e.type)}</div>
              ${e.mood ? `<span class="chip chip-sm" style="background:${e.mood==='Positive'?'var(--green-soft)':e.mood==='Difficult'?'var(--rose-soft)':'var(--surface3)'};color:${e.mood==='Positive'?'var(--green)':e.mood==='Difficult'?'var(--rose)':'var(--text-2)'}">${esc(e.mood)}</span>` : ''}
              ${e.voice ? `<span class="chip chip-sm" style="background:var(--surface3);color:var(--text-2)">${Icons.mic()}<span>Voice</span></span>` : ''}
            </div>
            ${e.summary ? `<div style="font-size:13px;color:var(--text-2);line-height:1.5;white-space:pre-wrap">${esc(e.summary)}</div>` : ''}
            ${e.location ? `<div style="font-size:12px;color:var(--text-3);margin-top:4px">${esc(e.location)}</div>` : ''}
            <div style="font-size:11px;color:var(--text-3);margin-top:5px">${esc(formatDateLong(new Date(e.date)))}</div>
          </div>
        </button>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  html += `<div style="height:80px"></div></div>`;
  document.getElementById('screen-host').innerHTML = html;
}

function quickActionBtn(label, icon, link) {
  const disabled = !link;
  return `<a ${link?`href="${esc(link)}"`:''} class="tap" style="
    flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px 0;
    text-decoration:none;color:${disabled?'var(--text-3)':'var(--green)'};opacity:${disabled?0.45:1};pointer-events:${disabled?'none':'auto'}">
    <div style="width:38px;height:38px;border-radius:50%;background:var(--green-soft);display:flex;align-items:center;justify-content:center">${Icons[icon]()}</div>
    <span style="font-size:12px;font-weight:500">${esc(label)}</span>
  </a>`;
}

function openContactActions(id) {
  const c = DB.getContact(state.profileId, id);
  if (!c) return;
  openSheet({
    title: fullName(c),
    body: `<div style="padding:8px 0">
      ${actionRow('Edit contact', 'gear', `closeSheet();openEditContact('${id}')`)}
      ${actionRow('Log encounter', 'plus', `closeSheet();openLogEncounter('${id}')`)}
      ${actionRow('Edit memory notes', 'sparkles', `closeSheet();openEditMemory('${id}')`)}
      ${actionRow('Add relationship', 'network', `closeSheet();openAddRelationship('${id}')`)}
      ${actionRow(c.isVip?'Remove VIP':'Mark as VIP', 'star', `closeSheet();toggleVip('${id}')`)}
      ${actionRow(c.archived?'Unarchive':'Archive', 'download', `closeSheet();toggleArchive('${id}')`)}
      ${actionRow('Delete contact', 'trash', `closeSheet();confirmDeleteContact('${id}')`, true)}
    </div>`,
    hideCancel: false,
    primaryLabel: '',
  });
  document.getElementById('sheet-save').style.display = 'none';
}

function actionRow(label, icon, onClick, danger) {
  return `<button class="tap-bg" onclick="${onClick}" style="
    display:flex;align-items:center;gap:14px;padding:14px 20px;width:100%;background:transparent;border:none;text-align:left;cursor:pointer;border-bottom:0.5px solid var(--sep2);
    color:${danger?'var(--rose)':'var(--text)'}">
    <div style="width:32px;height:32px;border-radius:9px;background:${danger?'var(--rose-soft)':'var(--green-soft)'};color:${danger?'var(--rose)':'var(--green)'};display:flex;align-items:center;justify-content:center">${Icons[icon]()}</div>
    <div style="flex:1;font-size:16px">${esc(label)}</div>
  </button>`;
}

function toggleVip(id) {
  const c = DB.getContact(state.profileId, id);
  if (!c) return;
  c.isVip = !c.isVip;
  DB.saveContact(state.profileId, c);
  toast(c.isVip ? 'Marked as VIP' : 'VIP removed');
  if (state.screen === 'detail' && state.contactId === id) renderContactDetail(id);
}

function toggleArchive(id) {
  const c = DB.getContact(state.profileId, id);
  if (!c) return;
  c.archived = !c.archived;
  DB.saveContact(state.profileId, c);
  toast(c.archived ? 'Archived' : 'Unarchived');
  if (c.archived) popScreen();
  else if (state.screen === 'detail' && state.contactId === id) renderContactDetail(id);
}

function confirmDeleteContact(id) {
  const c = DB.getContact(state.profileId, id);
  if (!c) return;
  showDialog('Delete ' + fullName(c) + '?', 'This removes the contact and all their encounters. Cannot be undone.', [
    { label: 'Delete', destructive: true, onClick: () => {
      DB.deleteContact(state.profileId, id);
      hideDialog();
      toast('Contact deleted');
      popScreen();
    }},
    { label: 'Cancel', onClick: hideDialog },
  ]);
}

/* ============================================================
   SEARCH
   ============================================================ */
function renderSearch() {
  const host = document.getElementById('screen-host');
  const contacts = DB.getContacts(state.profileId).filter(c => !c.archived);
  const allEncounters = contacts.flatMap(c => DB.getEncounters(state.profileId, c.id).map(e => ({...e, contact: c})));
  const q = (state.searchQuery || '').toLowerCase().trim();

  let html = `
    <div class="anim-fade" style="padding-top:env(safe-area-inset-top)">
      <div style="padding:12px 20px 4px">
        <h1 class="large-title">Search</h1>
      </div>
      <div style="padding:12px 20px 8px">
        <div style="background:var(--surface);border-radius:12px;padding:0 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm)">
          <span style="color:var(--text-3)">${Icons.search()}</span>
          <input type="text" id="search-q" placeholder="Names, companies, tags, memory…" value="${esc(state.searchQuery||'')}"
            oninput="state.searchQuery=this.value;renderSearch();setTimeout(()=>document.getElementById('search-q').focus(),0)"
            style="flex:1;border:none;outline:none;background:transparent;padding:14px 0;font-size:16px;color:var(--text)" autofocus>
          ${state.searchQuery ? `<button class="tap" onclick="state.searchQuery='';renderSearch()" style="background:transparent;border:none;color:var(--text-3);cursor:pointer;padding:4px;font-size:18px">×</button>` : ''}
        </div>
      </div>
  `;

  if (!q) {
    html += `<div class="empty">
      <div class="empty-icon" style="color:var(--green)">${Icons.search()}</div>
      <h3>Find anyone, anything</h3>
      <p>Search by name, company, tag, interest, key fact, or anything you've written down.</p>
    </div>`;
  } else {
    /* Search contacts */
    const peopleResults = contacts.filter(c => {
      const text = [fullName(c), c.company, c.jobTitle, c.workEmail, c.personalEmail, c.mobile, (c.tags||[]).join(' '), c.keyFacts, c.interests, c.importantPeople, c.memoryNotes, c.location, c.industry].filter(Boolean).join(' ').toLowerCase();
      return text.includes(q);
    });
    /* Search encounters */
    const encResults = allEncounters.filter(e => {
      const text = [e.summary, e.location, e.type, e.mood].filter(Boolean).join(' ').toLowerCase();
      return text.includes(q);
    }).sort((a,b) => (b.date||'').localeCompare(a.date||''));

    if (peopleResults.length === 0 && encResults.length === 0) {
      html += `<div class="empty">
        <h3>No matches for "${esc(state.searchQuery)}"</h3>
        <p>Try a different word or phrase.</p>
      </div>`;
    } else {
      if (peopleResults.length > 0) {
        html += `<div class="section-header"><h2>People (${peopleResults.length})</h2></div>`;
        html += `<div style="padding:0 20px 14px"><div class="card card-flush">`;
        peopleResults.forEach((c, i) => {
          const ac = avatarColor(c.avatarColor);
          const init = (initials(c) || '·').toUpperCase();
          html += `<button class="tap-bg" onclick="openContact('${c.id}')" style="
            display:flex;align-items:center;gap:12px;padding:12px 14px;width:100%;background:transparent;border:none;text-align:left;cursor:pointer;${i<peopleResults.length-1?'border-bottom:0.5px solid var(--sep2)':''}">
            <div class="avatar" style="width:40px;height:40px;font-size:14px;background:${ac.bg};color:${ac.text}">${esc(init)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:15px;font-weight:600;color:var(--text)">${highlightText(fullName(c), q)}</div>
              <div style="font-size:13px;color:var(--text-2)">${highlightText(c.company || c.jobTitle || c.relationshipType || '', q)}</div>
            </div>
          </button>`;
        });
        html += `</div></div>`;
      }
      if (encResults.length > 0) {
        html += `<div class="section-header"><h2>Encounters (${encResults.length})</h2></div>`;
        html += `<div style="padding:0 20px 100px"><div class="card card-flush">`;
        encResults.slice(0, 30).forEach((e, i, arr) => {
          const ico = TYPE_ICON[e.type] || 'dots';
          html += `<button class="tap-bg" onclick="openContact('${e.contact.id}')" style="
            display:flex;align-items:flex-start;gap:12px;padding:12px 14px;width:100%;background:transparent;border:none;text-align:left;cursor:pointer;${i<arr.length-1?'border-bottom:0.5px solid var(--sep2)':''}">
            <div style="width:34px;height:34px;border-radius:9px;background:var(--green-soft);color:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0">${Icons[ico]()}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:600;color:var(--text)">${esc(fullName(e.contact))} · ${esc(e.type)}</div>
              ${e.summary ? `<div style="font-size:13px;color:var(--text-2);line-height:1.4">${highlightText(e.summary, q)}</div>` : ''}
              <div style="font-size:11px;color:var(--text-3);margin-top:4px">${esc(relativeDate(e.date))}</div>
            </div>
          </button>`;
        });
        html += `</div></div>`;
      }
    }
  }

  html += `</div>`;
  host.innerHTML = html;
}

function highlightText(text, q) {
  if (!text) return '';
  const safe = esc(text);
  if (!q) return safe;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
  return safe.replace(re, '<mark class="search-mark">$1</mark>');
}

/* ============================================================
   FOLLOW-UPS SCREEN
   ============================================================ */
function renderFollowups() {
  const host = document.getElementById('screen-host');
  const contacts = DB.getContacts(state.profileId).filter(c => !c.archived);
  const now = new Date();
  const today0 = new Date(); today0.setHours(0,0,0,0);
  const tomorrow = new Date(today0); tomorrow.setDate(tomorrow.getDate()+1);
  const weekEnd = new Date(today0); weekEnd.setDate(weekEnd.getDate()+7);

  const items = contacts
    .filter(c => c.nextFollowUp && !c.followUpDone && !c.followUpDismissed)
    .map(c => ({ c, due: new Date(c.nextFollowUp) }))
    .sort((a,b) => a.due - b.due);

  const overdue = items.filter(x => x.due < today0);
  const todayItems = items.filter(x => x.due >= today0 && x.due < tomorrow);
  const week = items.filter(x => x.due >= tomorrow && x.due < weekEnd);
  const later = items.filter(x => x.due >= weekEnd);

  let html = `
    <div class="anim-slide-right" style="padding-top:env(safe-area-inset-top)">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 8px 0">
        <button class="tap" onclick="popScreen()" style="display:inline-flex;align-items:center;color:var(--green);background:transparent;border:none;font-size:17px;padding:8px 12px;cursor:pointer">${Icons.chevron('left')}<span style="margin-left:4px">Home</span></button>
        <span style="width:40px"></span>
      </div>
      <div style="padding:8px 20px 4px">
        <h1 class="large-title">Follow-ups</h1>
        <div style="font-size:14px;color:var(--text-2);margin-top:4px">${items.length} active</div>
      </div>
  `;

  if (items.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon" style="color:var(--green)">${Icons.check()}</div>
      <h3>You're all caught up</h3>
      <p>No follow-ups due. Set one when you log an encounter.</p>
    </div>`;
  } else {
    html += renderFollowupGroup('Overdue', overdue, true);
    html += renderFollowupGroup('Today', todayItems, true);
    html += renderFollowupGroup('This week', week, false);
    html += renderFollowupGroup('Later', later, false);
  }

  html += `<div style="height:80px"></div></div>`;
  host.innerHTML = html;
}

function renderFollowupGroup(label, items, urgent) {
  if (items.length === 0) return '';
  let html = `<div class="section-header" style="margin-top:14px"><h2 style="${urgent?'color:var(--rose)':''}">${esc(label)} · ${items.length}</h2></div>`;
  html += `<div style="padding:0 20px 4px"><div class="card card-flush">`;
  items.forEach(({c,due}, i) => {
    const ac = avatarColor(c.avatarColor);
    const init = (initials(c) || '·').toUpperCase();
    const ds = Math.floor((due - new Date().setHours(0,0,0,0)) / (1000*60*60*24));
    const when = ds < 0 ? Math.abs(ds) + 'd overdue' : (ds === 0 ? 'Today' : (ds === 1 ? 'Tomorrow' : 'In ' + ds + 'd'));
    html += `<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;${i<items.length-1?'border-bottom:0.5px solid var(--sep2)':''}">
      <div class="avatar" style="width:40px;height:40px;font-size:14px;background:${ac.bg};color:${ac.text};flex-shrink:0">${esc(init)}</div>
      <div style="flex:1;min-width:0">
        <button class="tap" onclick="openContact('${c.id}')" style="background:transparent;border:none;text-align:left;padding:0;cursor:pointer;display:block;width:100%">
          <div style="font-size:15px;font-weight:600;color:var(--text)">${esc(fullName(c))}</div>
          <div style="font-size:13px;color:${urgent?'var(--rose)':'var(--text-2)'};font-weight:${urgent?600:400}">${when} · ${esc(formatDate(due))}</div>
          ${c.nextFollowUpNote ? `<div style="font-size:13px;color:var(--text-2);margin-top:4px;line-height:1.4">"${esc(c.nextFollowUpNote)}"</div>` : ''}
        </button>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <button class="tap chip chip-green-solid chip-sm" style="border:none;cursor:pointer" onclick="completeFollowUp('${c.id}')">Done</button>
          <button class="tap chip chip-sm" style="background:var(--surface2);color:var(--text-2);border:none;cursor:pointer" onclick="snoozeFollowUp('${c.id}', 1)">+1d</button>
          <button class="tap chip chip-sm" style="background:var(--surface2);color:var(--text-2);border:none;cursor:pointer" onclick="snoozeFollowUp('${c.id}', 7)">+1w</button>
          <button class="tap chip chip-sm" style="background:var(--surface2);color:var(--text-2);border:none;cursor:pointer" onclick="dismissFollowUp('${c.id}')">Dismiss</button>
        </div>
      </div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function snoozeFollowUp(contactId, days) {
  const c = DB.getContact(state.profileId, contactId);
  if (!c) return;
  const d = c.nextFollowUp ? new Date(c.nextFollowUp) : new Date();
  d.setDate(d.getDate() + days);
  /* If snoozing from past, snooze from today */
  const now = new Date();
  if (d < now) { d.setTime(now.getTime()); d.setDate(d.getDate() + days); }
  c.nextFollowUp = d.toISOString().slice(0,10);
  DB.saveContact(state.profileId, c);
  toast('Snoozed ' + days + ' day' + (days===1?'':'s'));
  renderFollowups();
}

function dismissFollowUp(contactId) {
  const c = DB.getContact(state.profileId, contactId);
  if (!c) return;
  c.followUpDismissed = true;
  DB.saveContact(state.profileId, c);
  toast('Dismissed');
  renderFollowups();
}

const _origNavTab = navTab;
navTab = function(tab) {
  if (tab === 'followups') {
    pushScreen('', { screen: 'followups' });
    renderFollowups();
    return;
  }
  _origNavTab(tab);
};

function confirmDeleteProfile() {
  const profile = DB.getProfiles().find(p => p.id === state.profileId);
  if (!profile) return;
  showDialog('Delete this profile?', 'All contacts and encounters under "' + profile.name + '" will be permanently removed from this device. Cannot be undone.', [
    { label: 'Delete profile', destructive: true, onClick: () => {
      DB.deleteProfile(state.profileId);
      hideDialog();
      const remaining = DB.getProfiles();
      if (remaining.length > 0) {
        state.profileId = remaining[0].id;
        localStorage.setItem('grove_active_profile', state.profileId);
        enterApp();
      } else {
        localStorage.removeItem('grove_active_profile');
        showWelcome();
      }
      toast('Profile deleted');
    }},
    { label: 'Cancel', onClick: hideDialog },
  ]);
}

function exportBackup() {
  const profile = DB.getProfiles().find(p => p.id === state.profileId);
  const data = DB.exportProfile(state.profileId);
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'grove-' + (profile?.name||'backup').replace(/\s+/g,'-').toLowerCase() + '-' + today() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
}

/* ============================================================
   VOICE NOTES — MediaRecorder
   ============================================================ */
let _recorder = null;
let _recChunks = [];
let _recStart = 0;
let _recTimerInt = null;

async function toggleVoiceRecord() {
  if (_recorder && _recorder.state === 'recording') {
    stopVoiceRecording();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _recChunks = [];
    let mime = '';
    if (window.MediaRecorder) {
      const candidates = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/aac'];
      mime = candidates.find(c => MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) || '';
    }
    _recorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    _recorder.ondataavailable = ev => { if (ev.data && ev.data.size) _recChunks.push(ev.data); };
    _recorder.onstop = async () => {
      const blob = new Blob(_recChunks, { type: _recorder.mimeType || 'audio/webm' });
      const dur = (Date.now() - _recStart) / 1000;
      const reader = new FileReader();
      reader.onload = () => {
        window._encDraft.voice = { data: reader.result, mime: blob.type, duration: dur };
        document.getElementById('enc-voice-status').textContent = 'Voice note saved · ' + formatDuration(dur);
        document.getElementById('enc-rec-label').textContent = 'Re-record';
      };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t => t.stop());
    };
    _recStart = Date.now();
    _recorder.start();
    document.getElementById('enc-rec-label').textContent = 'Stop';
    document.getElementById('enc-rec-timer').style.display = '';
    _recTimerInt = setInterval(() => {
      const s = Math.floor((Date.now() - _recStart) / 1000);
      const m = Math.floor(s / 60), sec = s % 60;
      document.getElementById('enc-rec-time').textContent = m + ':' + (sec<10?'0':'') + sec;
    }, 250);
  } catch (e) {
    showDialog('Microphone unavailable', 'Grove couldn\'t access your microphone. Check Settings → Safari → Microphone.', [{ label: 'OK', primary: true, onClick: hideDialog }]);
  }
}

function stopVoiceRecording(silent) {
  if (_recorder && _recorder.state === 'recording') {
    _recorder.stop();
  }
  if (_recTimerInt) { clearInterval(_recTimerInt); _recTimerInt = null; }
  const t = document.getElementById('enc-rec-timer');
  if (t) t.style.display = 'none';
  if (!silent) {
    const lbl = document.getElementById('enc-rec-label');
    if (lbl) lbl.textContent = window._encDraft && window._encDraft.voice ? 'Re-record' : 'Voice note';
  }
}

function playVoice() {
  const v = (window._encDraft && window._encDraft.voice) || null;
  if (!v) return;
  const a = new Audio(v.data);
  a.play();
}

function deleteVoice() {
  if (!window._encDraft) return;
  window._encDraft.voice = null;
  document.getElementById('enc-voice-status').textContent = '';

function openAddRelationship(contactId) {
  const c = DB.getContact(state.profileId, contactId);
  if (!c) return;
  const others = DB.getContacts(state.profileId).filter(x => x.id !== contactId && !x.archived);
  const linked = new Set((c.relationships||[]).map(r => r.contactId));
  let q = '';
  let pickType = 'friend';
  let pickId = '';
  let note = '';

  const renderBody = () => {
    const filtered = q ? others.filter(o => fullName(o).toLowerCase().includes(q.toLowerCase())) : others;
    return `<div style="padding:0 20px 20px">
      <div style="margin-bottom:14px">
        <div class="form-label" style="margin-bottom:6px">Type</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${RELATIONSHIP_TYPES.map(rt => `
            <button class="tap chip chip-sm" onclick="_relPickType='${rt.id}';renderRelBody()" style="cursor:pointer;border:1.5px solid ${pickType===rt.id?'var(--green)':'transparent'};background:${pickType===rt.id?'var(--green-soft)':'var(--surface2)'};color:${pickType===rt.id?'var(--green)':'var(--text-2)'}">${esc(rt.label)}</button>
          `).join('')}
        </div>
      </div>
      <div style="margin-bottom:14px">
        <div class="form-label" style="margin-bottom:6px">Note (optional)</div>
        <input class="form-input" value="${esc(note)}" oninput="_relNote=this.value" placeholder="e.g. Tom's wife" style="background:var(--surface);padding:12px 14px;border-radius:10px;border:none">
      </div>
      <div style="margin-bottom:8px">
        <div class="form-label" style="margin-bottom:6px">Person</div>
        <input placeholder="Search" value="${esc(q)}" oninput="_relQ=this.value;renderRelBody()" style="width:100%;padding:12px 14px;border-radius:10px;background:var(--surface);border:none;outline:none;font-size:16px;color:var(--text)">
      </div>
      <div style="max-height:40vh;overflow-y:auto;border-radius:12px;background:var(--surface);">
        ${filtered.length===0?'<div style="padding:20px;text-align:center;color:var(--text-3)">No matches</div>':filtered.slice(0,80).map(o => {
          const ac = avatarColor(o.avatarColor);
          const init = (initials(o)||'·').toUpperCase();
          const isLinked = linked.has(o.id);
          const isPicked = pickId === o.id;
          return `<button class="tap-bg" ${isLinked?'disabled':''} onclick="_relPickId='${o.id}';renderRelBody()" style="
            display:flex;align-items:center;gap:12px;padding:12px 14px;width:100%;background:${isPicked?'var(--green-soft)':'transparent'};border:none;text-align:left;cursor:${isLinked?'default':'pointer'};border-bottom:0.5px solid var(--sep2);opacity:${isLinked?0.4:1}">
            <div class="avatar" style="width:36px;height:36px;font-size:13px;background:${ac.bg};color:${ac.text}">${esc(init)}</div>
            <div style="flex:1;font-size:14px;color:var(--text)">${esc(fullName(o))}${isLinked?' <span style="color:var(--text-3);font-size:11px">· already linked</span>':''}</div>
            ${isPicked?`<span style="color:var(--green)">${Icons.check()}</span>`:''}
          </button>`;
        }).join('')}
      </div>
    </div>`;
  };

  window._relPickType = pickType;
  window._relPickId = '';
  window._relQ = '';
  window._relNote = '';
  window.renderRelBody = () => {
    pickType = window._relPickType;
    pickId = window._relPickId;
    q = window._relQ;
    note = window._relNote;
    document.getElementById('sheet-body').innerHTML = renderBody();
    setSheetPrimaryEnabled(!!pickId);
  };

  openSheet({
    title: 'Link to another person',
    body: renderBody(),
    primaryLabel: 'Link',
    primaryDisabled: true,
    onPrimary: () => {
      const otherId = window._relPickId;
      if (!otherId) return;
      /* Add to current contact */
      c.relationships = c.relationships || [];
      c.relationships.push({ contactId: otherId, type: window._relPickType, note: window._relNote });
      DB.saveContact(state.profileId, c);
      /* Mirror on other contact */
      const other = DB.getContact(state.profileId, otherId);
      if (other) {
        other.relationships = other.relationships || [];
        if (!other.relationships.find(r => r.contactId === c.id)) {
          other.relationships.push({ contactId: c.id, type: window._relPickType, note: window._relNote });
          DB.saveContact(state.profileId, other);
        }
      }
      closeSheet();
      toast('Linked');
      if (state.contactId === c.id) renderContactDetail(c.id);
    }
  });
}

function removeRelationship(contactId, otherId) {
  showDialog('Remove relationship?', 'This unlinks them from each other.', [
    { label: 'Remove', destructive: true, onClick: () => {
      const c = DB.getContact(state.profileId, contactId);
      const other = DB.getContact(state.profileId, otherId);
      if (c) {
        c.relationships = (c.relationships||[]).filter(r => r.contactId !== otherId);
        DB.saveContact(state.profileId, c);
      }
      if (other) {
        other.relationships = (other.relationships||[]).filter(r => r.contactId !== contactId);
        DB.saveContact(state.profileId, other);
      }
      hideDialog(); toast('Unlinked');
      if (state.contactId === contactId) renderContactDetail(contactId);
    }},
    { label: 'Cancel', onClick: hideDialog },
  ]);
}

<script>
/* ============================================================

function openImportPicker() {

          <div style="width:38px;height:38px;border-radius:10px;background:var(--green-soft);display:flex;align-items:center;justify-content:center;color:var(--green);flex-shrink:0">${Icons.list}</div>

          <div style="width:38px;height:38px;border-radius:10px;background:var(--gold-soft);display:flex;align-items:center;justify-content:center;color:var(--gold-ink);flex-shrink:0">${Icons.download}</div>
          <div style="flex:1;min-width:0">

/* -------- VCF -------- */
function handleVcfFile(e) {
  const f = e.target.files && e.target.files[0];
  e.target.value = '';
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const rows = parseVcf(r.result);
      if (!rows.length) { toast('No contacts found in file'); return; }
      showImportPreview(rows, 'vCard');
    } catch (err) {
      console.error(err);
      toast('Could not read .vcf');
    }
  };
  r.readAsText(f);
}

function parseVcf(text) {
  const blocks = text.replace(/\r/g, '').split(/BEGIN:VCARD/i).slice(1);
  const out = [];
  blocks.forEach(b => {
    const body = b.split(/END:VCARD/i)[0];
    // Unfold lines (RFC 6350) — continuation lines start with space/tab
    const unfolded = body.replace(/\n[ \t]/g, '');
    const lines = unfolded.split('\n').map(l => l.trim()).filter(Boolean);
    const c = { firstName:'', lastName:'', mobile:'', workEmail:'', personalEmail:'',
                company:'', jobTitle:'', birthday:'', notes:'', linkedin:'' };
    lines.forEach(line => {
      const idx = line.indexOf(':');
      if (idx < 0) return;
      const head = line.slice(0, idx);
      let val = line.slice(idx + 1).replace(/\\,/g, ',').replace(/\\;/g, ';').replace(/\\n/gi, '\n').trim();
      const [name, ...params] = head.split(';');
      const upName = name.toUpperCase();
      if (upName === 'FN') {
        if (!c.firstName && !c.lastName) {
          const parts = val.split(' ');
          c.firstName = parts.shift() || '';
          c.lastName = parts.join(' ');
        }
      } else if (upName === 'N') {
        const np = val.split(';');
        c.lastName = c.lastName || np[0] || '';
        c.firstName = c.firstName || np[1] || '';
      } else if (upName === 'TEL') {
        const isMobile = params.some(p => /CELL|MOBILE|IPHONE/i.test(p));
        if (isMobile || !c.mobile) c.mobile = val;
      } else if (upName === 'EMAIL') {
        const isWork = params.some(p => /WORK/i.test(p));
        if (isWork && !c.workEmail) c.workEmail = val;
        else if (!c.personalEmail) c.personalEmail = val;
      } else if (upName === 'ORG') {
        c.company = val.split(';')[0] || val;
      } else if (upName === 'TITLE') {
        c.jobTitle = val;
      } else if (upName === 'BDAY') {
        // Normalize to YYYY-MM-DD if possible
        const m = val.match(/^(\d{4})-?(\d{2})-?(\d{2})/);
        if (m) c.birthday = `${m[1]}-${m[2]}-${m[3]}`;
        else if (val.match(/^--?(\d{2})-?(\d{2})$/)) {
          const mm = val.match(/^--?(\d{2})-?(\d{2})$/);
          c.birthday = `1900-${mm[1]}-${mm[2]}`; // year unknown
        }
      } else if (upName === 'NOTE') {
        c.notes = val;
      } else if (upName === 'URL') {
        if (/linkedin\.com/i.test(val)) c.linkedin = val;
      }
    });
    if (c.firstName || c.lastName || c.workEmail || c.personalEmail || c.mobile) {
      out.push(c);
    }
  });
  return out;
}

/* -------- CSV -------- */
function handleCsvFile(e) {
  const f = e.target.files && e.target.files[0];
  e.target.value = '';
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const rows = parseCsv(r.result);
      if (!rows.length) { toast('No rows found in file'); return; }
      showImportPreview(rows, 'CSV');
    } catch (err) {
      console.error(err);
      toast('Could not read .csv');
    }
  };
  r.readAsText(f);
}

function parseCsv(text) {
  const lines = parseCsvRows(text);
  if (!lines.length) return [];
  const header = lines.shift().map(h => h.trim().toLowerCase());
  const map = {
    firstName: ['first name','firstname','given name','first'],
    lastName:  ['last name','lastname','surname','family name','last'],
    company:   ['company','organization','organisation','employer'],
    jobTitle:  ['title','job title','position','role'],
    workEmail: ['work email','email work','business email','email 2'],
    personalEmail: ['email','personal email','email home','primary email','email 1'],
    mobile:    ['mobile','phone','cell','mobile phone','phone 1','primary phone'],
    birthday:  ['birthday','birth date','dob','date of birth'],
    location:  ['city','location','address'],
    linkedin:  ['linkedin','linkedin url'],
    notes:     ['notes','note','description'],
  };
  const idx = {};
  Object.keys(map).forEach(k => {
    idx[k] = -1;
    for (const alias of map[k]) {
      const i = header.indexOf(alias);
      if (i >= 0) { idx[k] = i; break; }
    }
  });
  // Fallback: split a single "Name" column
  const nameIdx = header.indexOf('name');
  return lines.map(cells => {
    const c = { firstName:'', lastName:'', mobile:'', workEmail:'', personalEmail:'',
                company:'', jobTitle:'', birthday:'', notes:'', linkedin:'', location:'' };
    Object.keys(idx).forEach(k => { if (idx[k] >= 0) c[k] = (cells[idx[k]] || '').trim(); });
    if (!c.firstName && !c.lastName && nameIdx >= 0) {
      const full = (cells[nameIdx] || '').trim().split(/\s+/);
      c.firstName = full.shift() || '';
      c.lastName = full.join(' ');
    }
    if (c.birthday) {
      const m = c.birthday.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/) || c.birthday.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/);
      if (m) {
        if (m[1].length === 4) c.birthday = `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
        else c.birthday = `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
      } else { c.birthday = ''; }
    }
    return c;
  }).filter(c => c.firstName || c.lastName || c.personalEmail || c.workEmail || c.mobile);
}

function parseCsvRows(text) {
  const rows = [];
  let cur = [], field = '', inQuotes = false;
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { cur.push(field); field = ''; }
      else if (ch === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
      else { field += ch; }
    }
  }
  if (field.length || cur.length) { cur.push(field); rows.push(cur); }
  return rows.filter(r => r.some(v => v.trim().length));
}

/* -------- Grove backup JSON -------- */
function handleJsonFile(e) {
  const f = e.target.files && e.target.files[0];
  e.target.value = '';
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const data = JSON.parse(r.result);
      if (!data || !data.profile) { toast('Not a Grove backup'); return; }
      showDialog('Restore profile?', `“${data.profile.name||'Profile'}” will be added with ${(data.contacts||[]).length} contacts. Existing data won't be touched.`, [
        { label: 'Cancel', onClick: hideDialog },
        { label: 'Restore', onClick: () => {
          try {
            const id = DB.importProfile(data);
            hideDialog();
            closeSheet();
            toast('Profile restored');
            state.profileId = id;
            localStorage.setItem('grove_active_profile', id);
            enterApp();
          } catch (err) {
            console.error(err);
            hideDialog();
            toast('Could not restore');
          }
        } },
      ]);
    } catch (err) {
      console.error(err);
      toast('Invalid backup file');
    }
  };
  r.readAsText(f);
}

/* -------- Preview & commit -------- */
function showImportPreview(rows, sourceLabel) {
  _importRows = rows.map(r => ({ ...r, _selected: true }));
  openSheet({
    title: `Import ${rows.length} from ${sourceLabel}`,
    primaryLabel: `Import ${rows.length}`,
    body: renderImportPreviewBody(),
    onPrimary: commitImport,
  });
}

function renderImportPreviewBody() {
  const allOn = _importRows.every(r => r._selected);
  const selectedCount = _importRows.filter(r => r._selected).length;
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 4px 14px">
      <div style="font-size:13px;color:var(--text-2)">${selectedCount} selected</div>
      <button class="tap" onclick="toggleSelectAll()" style="background:transparent;border:none;color:var(--green);font-size:14px;font-weight:600;cursor:pointer">${allOn?'Deselect all':'Select all'}</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:62vh;overflow-y:auto">
      ${_importRows.map((r, i) => `
        <label style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg-2);border-radius:12px;cursor:pointer">
          <input type="checkbox" ${r._selected?'checked':''} onchange="toggleImportRow(${i}, this.checked)" style="width:20px;height:20px;accent-color:var(--green);flex-shrink:0">
          <div class="avatar" style="width:36px;height:36px;font-size:13px;background:${AVATAR_PALETTE[i % AVATAR_PALETTE.length].hex};flex-shrink:0">${esc(((r.firstName||'?')[0]||'') + ((r.lastName||'')[0]||'')).toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(((r.firstName||'') + ' ' + (r.lastName||'')).trim() || 'No name')}</div>
            <div style="font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.workEmail || r.personalEmail || r.mobile || r.company || '—')}</div>
          </div>
        </label>
      `).join('')}
    </div>
  `;
}

function toggleSelectAll() {
  const allOn = _importRows.every(r => r._selected);
  _importRows.forEach(r => r._selected = !allOn);
  document.getElementById('sheet-body').innerHTML = renderImportPreviewBody();
}

function toggleImportRow(i, on) {
  if (_importRows[i]) _importRows[i]._selected = on;
  // Refresh count line without re-rendering the whole list
  const sel = _importRows.filter(r => r._selected).length;
  const head = document.querySelector('#sheet-body > div > div');
  if (head) head.textContent = `${sel} selected`;
}

function commitImport() {
  const sel = _importRows.filter(r => r._selected);
  if (!sel.length) { toast('Nothing selected'); return; }
  const palette = AVATAR_PALETTE;
  let added = 0;
  sel.forEach((r, i) => {
    const c = {
      id: uid(),
      firstName: r.firstName || '',
      lastName: r.lastName || '',
      jobTitle: r.jobTitle || '',
      company: r.company || '',
      industry: r.industry || '',
      location: r.location || '',
      mobile: r.mobile || '',
      workEmail: r.workEmail || '',
      personalEmail: r.personalEmail || '',
      linkedin: r.linkedin || '',
      socialHandle: '',
      birthday: r.birthday || '',
      relationshipType: '',
      relationshipStrength: 'connected',
      tags: [],
      vip: false,
      archived: false,
      avatarColor: palette[(i + Math.floor(Math.random()*palette.length)) % palette.length].id,
      interests: '',
      importantPeople: '',
      keyFacts: '',
      memoryNotes: r.notes || '',
      relationships: [],
      lastContactedAt: '',
      nextFollowUp: '',
      nextFollowUpNote: '',
      followUpDismissed: false,
      followUpDone: false,
      createdAt: new Date().toISOString(),
    };
    DB.saveContact(state.profileId, c);
    added++;
  });
  closeSheet();
  toast(`Imported ${added} ${added===1?'contact':'contacts'}`);
  _importRows = [];
  if (state.tab === 'contacts') renderContacts();
  if (state.tab === 'dashboard') renderDashboard();
}

/* ============================================================
   SECURITY INFO (welcome screen "find out how" link)
   ============================================================ */
function showSecurityInfo() {
  showDialog('Your data stays here', 'Grove is a Progressive Web App. Everything you put in — contacts, encounters, voice notes, memories — is stored only in this browser, on this device, using local storage. Nothing is uploaded, no account required, no analytics.\n\nExport a backup anytime from Settings → Data.', [
    { label: 'Got it', primary: true, onClick: hideDialog },
  ]);
}

/* ============================================================
   GLOBAL ERROR + RESIZE
   ============================================================ */
window.addEventListener('error', (e) => {
  console.error('Grove error:', e.message, e.filename, e.lineno);
});

let _resizeRaf;
window.addEventListener('resize', () => {
  if (_resizeRaf) cancelAnimationFrame(_resizeRaf);
  _resizeRaf = requestAnimationFrame(() => {
    const wrap = document.getElementById('boab-wrap');
    if (wrap && wrap.offsetParent !== null) renderBoab();
  });
});

/* ============================================================
   INIT
   ============================================================ */
function init() {
  loadTheme();
  // Honour system theme switches when in 'auto' mode (already wired in core)
  const profs = DB.getProfiles();
  const activeId = localStorage.getItem('grove_active_profile');

  if (profs.length === 0) {
    showWelcome();
    return;
  }

  if (activeId && profs.some(p => p.id === activeId)) {
    state.profileId = activeId;
    enterApp();
    return;
  }

  if (profs.length === 1) {
    state.profileId = profs[0].id;
    localStorage.setItem('grove_active_profile', state.profileId);
    enterApp();
    return;
  }

  showProfilePicker();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

</body>
</html>
